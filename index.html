<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShrinkIt — File Compressor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080c10;
    --surface: #0f1520;
    --border: #1e2d42;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --text: #e8f4f8;
    --muted: #4a6070;
    --success: #00e676;
    --mono: 'Space Mono', monospace;
    --sans: 'Manrope', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes orb1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%       { transform: translate(60px, -80px) scale(1.15); }
    66%       { transform: translate(-40px, 60px) scale(0.9); }
  }
  @keyframes orb2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%       { transform: translate(-70px, 50px) scale(1.1); }
    66%       { transform: translate(50px, -60px) scale(0.95); }
  }
  @keyframes orb3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%       { transform: translate(40px, 40px) scale(1.2); }
  }
  @keyframes gridPulse {
    0%, 100% { opacity: 0.18; }
    50%       { opacity: 0.32; }
  }
  @keyframes scanline {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  /* Animated gradient orbs */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.07) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridPulse 4s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    /* Slow scanline sweep */
    background: linear-gradient(180deg, transparent 0%, rgba(0,229,255,0.03) 50%, transparent 100%);
    background-size: 100% 200px;
    animation: scanline 8s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  /* Orb layer injected via JS below */

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: screen;
  }
  .orb-1 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(0,229,255,0.22) 0%, transparent 70%);
    top: -120px; left: -100px;
    animation: orb1 12s ease-in-out infinite;
  }
  .orb-2 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,107,53,0.18) 0%, transparent 70%);
    bottom: -150px; right: -120px;
    animation: orb2 15s ease-in-out infinite;
  }
  .orb-3 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(130,80,255,0.15) 0%, transparent 70%);
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    animation: orb3 9s ease-in-out infinite;
  }
  .orb-4 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(0,230,118,0.12) 0%, transparent 70%);
    top: 60%; left: 15%;
    animation: orb2 11s ease-in-out infinite reverse;
  }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header { text-align: center; margin-bottom: 48px; }
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-name {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text);
  }
  .logo-name span { color: var(--accent); }
  .tagline {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Drop Zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .drop-zone::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.03), rgba(255,107,53,0.03));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    box-shadow: 0 0 40px rgba(0,229,255,0.12), inset 0 0 40px rgba(0,229,255,0.03);
  }
  .drop-zone:hover::before, .drop-zone.dragover::before { opacity: 1; }
  .drop-icon { font-size: 52px; margin-bottom: 16px; display: block; }
  .drop-title {
    font-size: 20px; font-weight: 800;
    margin-bottom: 8px;
  }
  .drop-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .drop-sub span { color: var(--accent); }
  .btn-upload {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #000;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-upload:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,229,255,0.3);
  }
  #fileInput { display: none; }

  /* Format badges */
  .format-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }
  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .tag.img { border-color: rgba(0,229,255,0.3); color: var(--accent); }
  .tag.vid { border-color: rgba(255,107,53,0.3); color: var(--accent2); }

  /* Controls */
  .controls-panel {
    margin-top: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    display: none;
    animation: fadeUp 0.35s ease;
  }
  .controls-panel.visible { display: block; }
  .panel-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .control-row {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 18px;
  }
  .control-row:last-child { margin-bottom: 0; }
  .ctrl-label {
    font-size: 13px; font-weight: 600;
    min-width: 110px; color: var(--text);
  }
  .slider-wrap { flex: 1; display: flex; align-items: center; gap: 12px; }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--val, 80%), var(--border) var(--val, 80%), var(--border) 100%);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(0,229,255,0.2);
    transition: box-shadow 0.2s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 6px rgba(0,229,255,0.25);
  }
  .slider-val {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
  }
  select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 8px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  select:focus { border-color: var(--accent); }

  /* Compress Button */
  .btn-compress {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent2), #cc4400);
    color: #fff;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-compress:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(255,107,53,0.35);
  }
  .btn-compress:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Results */
  .result-panel {
    margin-top: 28px;
    display: none;
    animation: fadeUp 0.35s ease;
  }
  .result-panel.visible { display: block; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    text-align: center;
  }
  .stat-card.highlight {
    border-color: rgba(0,230,118,0.4);
    background: rgba(0,230,118,0.05);
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-card.highlight .stat-value { color: var(--success); }

  /* Preview */
  .preview-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .preview-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 12px;
    font-family: var(--mono);
  }
  .preview-img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 8px;
    display: block;
  }
  .video-preview {
    width: 100%;
    max-height: 300px;
    border-radius: 8px;
    display: block;
    background: #000;
  }

  /* Download */
  .btn-download {
    width: 100%;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--success);
    color: var(--success);
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-download:hover {
    background: rgba(0,230,118,0.08);
    box-shadow: 0 0 24px rgba(0,230,118,0.2);
    transform: translateY(-2px);
  }

  /* Reset */
  .btn-reset {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-reset:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin-top: 16px;
    overflow: hidden;
    display: none;
  }
  .progress-bar.visible { display: block; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s ease;
    animation: shimmer 1.5s infinite linear;
  }
  @keyframes shimmer {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
    100% { filter: brightness(1); }
  }

  /* File info bar */
  .file-info {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .file-info.visible { display: flex; }
  .file-icon { font-size: 22px; }
  .file-name { font-size: 14px; font-weight: 600; flex: 1; word-break: break-all; }
  .file-size-badge {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 10px;
    background: rgba(0,0,0,0.4);
    border-radius: 6px;
    color: var(--accent);
  }

  /* Error */
  .error-msg {
    color: #ff5252;
    font-size: 13px;
    margin-top: 12px;
    display: none;
    font-family: var(--mono);
    text-align: center;
  }
  .error-msg.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 500px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .stats-grid .stat-card:last-child { grid-column: 1 / -1; }
    .control-row { flex-wrap: wrap; }
    .ctrl-label { min-width: auto; width: 100%; }
  }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>
<canvas id="particleCanvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>

<div class="wrapper">

  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-name">Shrink<span>It</span></div>
    </div>
    <p class="tagline">Compress images &amp; videos · zero quality compromise</p>
  </header>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">📁</span>
    <div class="drop-title">Drop your file here</div>
    <p class="drop-sub">or <span>browse</span> to upload a photo or video</p>
    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Choose File</button>
    <input type="file" id="fileInput" accept="image/*,video/*" />
    <div class="format-tags">
      <span class="tag img">JPG</span>
      <span class="tag img">PNG</span>
      <span class="tag img">WEBP</span>
      <span class="tag img">GIF</span>
      <span class="tag vid">MP4</span>
      <span class="tag vid">MOV</span>
      <span class="tag vid">WEBM</span>
    </div>
  </div>

  <!-- File Info Bar -->
  <div class="file-info" id="fileInfo">
    <span class="file-icon" id="fileIcon">🖼️</span>
    <span class="file-name" id="fileName">—</span>
    <span class="file-size-badge" id="origSizeBadge">0 KB</span>
  </div>

  <!-- Controls -->
  <div class="controls-panel" id="controlsPanel">
    <div class="panel-title">// Compression Settings</div>
    <div class="control-row" id="qualityRow">
      <span class="ctrl-label">Quality</span>
      <div class="slider-wrap">
        <input type="range" id="qualitySlider" min="10" max="95" value="75" />
        <span class="slider-val" id="qualityVal">75%</span>
      </div>
    </div>
    <div class="control-row" id="formatRow">
      <span class="ctrl-label">Output Format</span>
      <select id="formatSelect">
        <option value="image/jpeg">JPEG (best compression)</option>
        <option value="image/webp">WebP (modern, smaller)</option>
        <option value="image/png">PNG (lossless)</option>
      </select>
    </div>
    <div class="control-row" id="scaleRow">
      <span class="ctrl-label">Scale</span>
      <div class="slider-wrap">
        <input type="range" id="scaleSlider" min="10" max="100" value="100" />
        <span class="slider-val" id="scaleVal">100%</span>
      </div>
    </div>
    <!-- Video controls -->
    <div class="control-row" id="videoBitrateRow" style="display:none;">
      <span class="ctrl-label">Target Bitrate</span>
      <select id="bitrateSelect">
        <option value="2000000">High (2 Mbps)</option>
        <option value="1000000" selected>Medium (1 Mbps)</option>
        <option value="500000">Low (500 Kbps)</option>
        <option value="250000">Minimal (250 Kbps)</option>
      </select>
    </div>

    <button class="btn-compress" id="compressBtn">
      <span>⚡</span> <span id="compressBtnText">Compress Now</span>
    </button>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Result -->
  <div class="result-panel" id="resultPanel">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Original</div>
        <div class="stat-value" id="origSize">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Compressed</div>
        <div class="stat-value" id="compSize">—</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-label">Space Saved</div>
        <div class="stat-value" id="savedPct">—</div>
      </div>
    </div>

    <div class="preview-section" id="previewSection">
      <div class="preview-label">// Preview</div>
      <img id="previewImg" class="preview-img" style="display:none;" />
      <video id="previewVid" class="video-preview" controls style="display:none;"></video>
    </div>

    <button class="btn-download" id="downloadBtn">
      ⬇ &nbsp;Download Compressed File
    </button>
    <button class="btn-reset" id="resetBtn">↩ Compress Another File</button>
  </div>

</div>

<script>
const dropZone    = document.getElementById('dropZone');
const fileInput   = document.getElementById('fileInput');
const fileInfo    = document.getElementById('fileInfo');
const fileName    = document.getElementById('fileName');
const fileIcon    = document.getElementById('fileIcon');
const origSizeBadge = document.getElementById('origSizeBadge');
const controlsPanel = document.getElementById('controlsPanel');
const resultPanel = document.getElementById('resultPanel');
const qualitySlider = document.getElementById('qualitySlider');
const qualityVal  = document.getElementById('qualityVal');
const scaleSlider = document.getElementById('scaleSlider');
const scaleVal    = document.getElementById('scaleVal');
const formatSelect = document.getElementById('formatSelect');
const compressBtn = document.getElementById('compressBtn');
const compressBtnText = document.getElementById('compressBtnText');
const progressBar = document.getElementById('progressBar');
const progressFill= document.getElementById('progressFill');
const errorMsg    = document.getElementById('errorMsg');
const origSizeEl  = document.getElementById('origSize');
const compSizeEl  = document.getElementById('compSize');
const savedPctEl  = document.getElementById('savedPct');
const previewImg  = document.getElementById('previewImg');
const previewVid  = document.getElementById('previewVid');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn    = document.getElementById('resetBtn');
const bitrateSelect = document.getElementById('bitrateSelect');
const qualityRow  = document.getElementById('qualityRow');
const formatRow   = document.getElementById('formatRow');
const scaleRow    = document.getElementById('scaleRow');
const videoBitrateRow = document.getElementById('videoBitrateRow');

let currentFile = null;
let compressedBlob = null;
let isVideo = false;

// Slider label update
function updateSlider(slider, label, unit) {
  const val = slider.value;
  label.textContent = val + unit;
  slider.style.setProperty('--val', val + '%');
}
qualitySlider.addEventListener('input', () => updateSlider(qualitySlider, qualityVal, '%'));
scaleSlider.addEventListener('input', () => updateSlider(scaleSlider, scaleVal, '%'));
updateSlider(qualitySlider, qualityVal, '%');
updateSlider(scaleSlider, scaleVal, '%');

// Drag & Drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
dropZone.addEventListener('click', e => { if (e.target === dropZone) fileInput.click(); });

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function handleFile(file) {
  currentFile = file;
  compressedBlob = null;
  isVideo = file.type.startsWith('video/');
  errorMsg.classList.remove('visible');
  resultPanel.classList.remove('visible');

  fileName.textContent = file.name;
  origSizeBadge.textContent = formatBytes(file.size);
  fileIcon.textContent = isVideo ? '🎬' : '🖼️';
  fileInfo.classList.add('visible');

  // Show/hide controls
  qualityRow.style.display = isVideo ? 'none' : 'flex';
  formatRow.style.display  = isVideo ? 'none' : 'flex';
  scaleRow.style.display   = isVideo ? 'none' : 'flex';
  videoBitrateRow.style.display = isVideo ? 'flex' : 'none';
  compressBtnText.textContent = isVideo ? 'Compress Video' : 'Compress Image';

  controlsPanel.classList.add('visible');
}

// Compress
compressBtn.addEventListener('click', async () => {
  if (!currentFile) return;
  errorMsg.classList.remove('visible');
  compressBtn.disabled = true;
  progressBar.classList.add('visible');
  setProgress(10);

  try {
    if (isVideo) {
      await compressVideo(currentFile);
    } else {
      await compressImage(currentFile);
    }
  } catch(err) {
    showError('Compression failed: ' + err.message);
    compressBtn.disabled = false;
    progressBar.classList.remove('visible');
  }
});

function setProgress(pct) {
  progressFill.style.width = pct + '%';
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

// ── Image Compression ──────────────────────────
async function compressImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.src = url;
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
  setProgress(40);

  const scale = parseInt(scaleSlider.value) / 100;
  const quality = parseInt(qualitySlider.value) / 100;
  const fmt = formatSelect.value;

  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(img.naturalWidth  * scale);
  canvas.height = Math.round(img.naturalHeight * scale);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  setProgress(70);

  const ext = fmt === 'image/webp' ? 'webp' : fmt === 'image/png' ? 'png' : 'jpg';
  const blob = await new Promise(res => canvas.toBlob(res, fmt, quality));
  setProgress(95);

  if (!blob) throw new Error('Could not compress image. Try a different format.');

  compressedBlob = blob;
  URL.revokeObjectURL(url);

  const outUrl = URL.createObjectURL(blob);
  previewImg.src = outUrl;
  previewImg.style.display = 'block';
  previewVid.style.display = 'none';

  const outName = file.name.replace(/\.[^.]+$/, '') + '_compressed.' + ext;
  downloadBtn.onclick = () => triggerDownload(outUrl, outName);

  showResults(file.size, blob.size);
}

// ── Video Compression ──────────────────────────
async function compressVideo(file) {
  const srcUrl = URL.createObjectURL(file);
  const video = document.createElement('video');
  video.src = srcUrl;
  video.muted = true;
  await new Promise((res, rej) => { video.onloadedmetadata = res; video.onerror = rej; });
  setProgress(20);

  const targetBitrate = parseInt(bitrateSelect.value);
  const canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');

  let mimeType = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8';
  if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
  if (!MediaRecorder.isTypeSupported(mimeType)) throw new Error('Your browser does not support video recording. Please try Chrome or Edge.');

  const stream = canvas.captureStream(30);
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: targetBitrate });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  // Copy audio from video element
  let audioCtx, audioDest;
  try {
    audioCtx = new AudioContext();
    const src = audioCtx.createMediaElementSource(video);
    audioDest = audioCtx.createMediaStreamDestination();
    src.connect(audioDest);
    src.connect(audioCtx.destination);
    audioDest.stream.getAudioTracks().forEach(t => stream.addTrack(t));
  } catch(e) { /* no audio or not supported */ }

  recorder.start(100);
  video.play();
  setProgress(30);

  await new Promise((res, rej) => {
    let animId;
    const draw = () => {
      if (video.ended || video.paused) { cancelAnimationFrame(animId); res(); return; }
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const prog = 30 + (video.currentTime / video.duration) * 60;
      setProgress(Math.min(90, prog));
      animId = requestAnimationFrame(draw);
    };
    video.onended = () => { cancelAnimationFrame(animId); res(); };
    video.onerror = rej;
    animId = requestAnimationFrame(draw);
  });

  recorder.stop();
  setProgress(92);
  if (audioCtx) audioCtx.close();

  await new Promise(res => { recorder.onstop = res; });
  setProgress(98);

  const blob = new Blob(chunks, { type: mimeType });
  compressedBlob = blob;
  URL.revokeObjectURL(srcUrl);

  const outUrl = URL.createObjectURL(blob);
  previewVid.src = outUrl;
  previewVid.style.display = 'block';
  previewImg.style.display = 'none';

  const outName = file.name.replace(/\.[^.]+$/, '') + '_compressed.webm';
  downloadBtn.onclick = () => triggerDownload(outUrl, outName);

  showResults(file.size, blob.size);
}

function showResults(origBytes, compBytes) {
  setProgress(100);
  setTimeout(() => progressBar.classList.remove('visible'), 600);

  origSizeEl.textContent = formatBytes(origBytes);
  compSizeEl.textContent = formatBytes(compBytes);
  const saved = Math.max(0, ((origBytes - compBytes) / origBytes * 100)).toFixed(1);
  savedPctEl.textContent = saved + '%';

  resultPanel.classList.add('visible');
  compressBtn.disabled = false;
  resultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function triggerDownload(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── Particle System ──────────────────────────
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const COLORS = ['rgba(0,229,255,', 'rgba(255,107,53,', 'rgba(130,80,255,', 'rgba(0,230,118,'];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function rand(a, b) { return a + Math.random() * (b - a); }

  class Particle {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = rand(0, W);
      this.y = init ? rand(0, H) : H + 10;
      this.r = rand(1, 2.5);
      this.speedY = rand(0.2, 0.7);
      this.speedX = rand(-0.2, 0.2);
      this.alpha  = rand(0.3, 0.8);
      this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.twinkle = rand(0.005, 0.015);
      this.twinkleDir = 1;
    }
    update() {
      this.y -= this.speedY;
      this.x += this.speedX;
      this.alpha += this.twinkle * this.twinkleDir;
      if (this.alpha > 0.85 || this.alpha < 0.15) this.twinkleDir *= -1;
      if (this.y < -5) this.reset(false);
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.color + this.alpha + ')';
      ctx.fill();
    }
  }

  for (let i = 0; i < 80; i++) particles.push(new Particle());

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

resetBtn.addEventListener('click', () => {
  currentFile = null;
  compressedBlob = null;
  fileInput.value = '';
  fileInfo.classList.remove('visible');
  controlsPanel.classList.remove('visible');
  resultPanel.classList.remove('visible');
  errorMsg.classList.remove('visible');
  progressBar.classList.remove('visible');
  previewImg.src = ''; previewImg.style.display = 'none';
  previewVid.src = ''; previewVid.style.display = 'none';
  qualitySlider.value = 75; updateSlider(qualitySlider, qualityVal, '%');
  scaleSlider.value = 100; updateSlider(scaleSlider, scaleVal, '%');
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
